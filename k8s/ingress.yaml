apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-service
  namespace: default
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    # IngressGroup: merges this Ingress with backend-service's Ingress into
    # ONE shared ALB per environment. INGRESS_GROUP_PLACEHOLDER is
    # substituted by the workflow with acme-cloud-poc / acme-cloud-dev /
    # acme-cloud-qa — MUST match backend-service's group.name for the same
    # environment exactly, or frontend/backend end up in different groups
    # and you'd get two ALBs per environment instead of one.
    alb.ingress.kubernetes.io/group.name: INGRESS_GROUP_PLACEHOLDER
    # Frontend's "/" rule must evaluate AFTER backend's "/api" rule, or "/"
    # would greedily match everything including /api requests first.
    alb.ingress.kubernetes.io/group.order: "10"
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
