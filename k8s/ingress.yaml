apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-service
  namespace: default
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    # IngressGroup: merges this Ingress with backend-service's Ingress into
    # ONE shared ALB instead of provisioning a second, separate load
    # balancer. Same group.name string on both resources is what triggers
    # the merge — the controller reconciles all Ingresses in a group into
    # a single ALB with combined routing rules.
    alb.ingress.kubernetes.io/group.name: acme-cloud-poc
    # Frontend's "/" rule must evaluate AFTER backend's "/api" rule, or "/"
    # would greedily match everything including /api requests first.
    alb.ingress.kubernetes.io/group.order: "10"
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
